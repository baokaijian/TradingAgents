name: Deploy Pages

on:
  push:
    branches: [master]
    paths:
      - "index.html"
      - ".nojekyll"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site/docs
          cp index.html _site/index.html
          cp .nojekyll _site/.nojekyll
          cp docs/design.html _site/docs/
          cp docs/ah_share_hk_auto_trading_platform_design.md _site/docs/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
